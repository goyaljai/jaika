<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ bot.title }}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: {{ bot.color }};
  --accent: {{ bot.accent }};
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --user-bubble: #1f6feb;
  --bot-bubble: #21262d;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { background: var(--primary); padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); flex-shrink: 0; }
.header .logo { font-size: 28px; }
.header .info h1 { font-size: 18px; font-weight: 700; color: #fff; }
.header .info p { font-size: 12px; color: rgba(255,255,255,0.75); }
.header .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.85); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; gap: 8px; max-width: 80%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }

.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.msg.bot .avatar { background: var(--primary); }
.msg.user .avatar { background: var(--user-bubble); font-size: 14px; }

.bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; max-width: 100%; word-break: break-word; }
.msg.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg.user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }

.bubble strong { font-weight: 600; }
.bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
.bubble li { margin: 3px 0; }

.typing { display: flex; align-items: center; gap: 4px; padding: 12px 14px; }
.typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--text2); animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

/* Input */
.input-area { padding: 16px 20px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
.input-row { display: flex; gap: 10px; align-items: flex-end; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; transition: border-color 0.2s; }
.input-row:focus-within { border-color: var(--primary); }
textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; font-family: inherit; resize: none; max-height: 120px; min-height: 22px; line-height: 1.5; }
textarea::placeholder { color: var(--text2); }
.send-btn { background: var(--primary); border: none; border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s; }
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; fill: #fff; }

.powered { text-align: center; font-size: 11px; color: var(--text2); margin-top: 8px; }
.powered a { color: var(--text2); text-decoration: none; }
.powered a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">{{ bot.logo }}</div>
  <div class="info">
    <h1>{{ bot.title }}</h1>
    <p>{{ bot.subtitle }}</p>
  </div>
  <div class="status"><div class="status-dot"></div> Online</div>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="{{ bot.placeholder }}" maxlength="1000"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by <a href="/" target="_blank">Jaika</a></div>
</div>

<script>
const BOT_UID = "{{ bot.uid }}";
const WELCOME = {{ bot.welcome | tojson }};
const BOT_LOGO = "{{ bot.logo }}";

let sessionId = null;
let busy = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
    .replace(/^\*\s+(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'bot' ? BOT_LOGO : '🧑';
  div.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble">${renderMarkdown(escapeHtml(text))}</div>
  `;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="avatar">${BOT_LOGO}</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy) return;

  busy = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage('user', text);
  showTyping();

  try {
    const res = await fetch('/api/prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-User-Id': BOT_UID },
      body: JSON.stringify({ prompt: text, session_id: sessionId, stream: false })
    });
    const data = await res.json();
    removeTyping();
    if (data.error) {
      addMessage('bot', 'Sorry, something went wrong. Please try again.');
    } else {
      sessionId = data.session_id;
      addMessage('bot', data.text);
    }
  } catch(e) {
    removeTyping();
    addMessage('bot', 'Connection error. Please try again.');
  }

  busy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Send on Enter (Shift+Enter for newline)
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Welcome message
window.onload = () => addMessage('bot', WELCOME);
</script>
</body>
</html>
