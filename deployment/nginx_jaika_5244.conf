server {
    listen 5244 ssl;
    listen [::]:5244 ssl;
    server_name 187-127-151-46.sslip.io;

    ssl_certificate /etc/letsencrypt/live/187-127-151-46.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/187-127-151-46.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:5245;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
